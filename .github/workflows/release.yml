name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build PrestaShop ZIP and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          MODULE="${GITHUB_REPOSITORY##*/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "module=${MODULE}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION} (${MODULE})"

      - name: Validate tag matches module version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MODULE_VERSION="$(sed -n 's:.*<version><!\[CDATA\[\(.*\)\]\]></version>.*:\1:p' config.xml)"
          MODULE_VERSION="${MODULE_VERSION:-$(sed -n 's:.*<version>\([^<]*\)</version>.*:\1:p' config.xml)}"

          if [ -z "$MODULE_VERSION" ]; then
            echo "Could not read module version from config.xml"
            exit 1
          fi

          if [ "$VERSION" != "$MODULE_VERSION" ]; then
            echo "Tag version (${VERSION}) does not match module version (${MODULE_VERSION})."
            echo "Update config.xml or create the tag with the correct version."
            exit 1
          fi

      - name: Build PrestaShop module ZIP
        run: |
          MODULE="${{ steps.version.outputs.module }}"
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="dist/${MODULE}-${VERSION}.zip"
          BUILD_DIR="$(mktemp -d)"

          mkdir -p dist

          if [ -f composer.json ]; then
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
          fi

          rsync -a ./ "${BUILD_DIR}/${MODULE}/" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "dist/" \
            --exclude ".gitignore" \
            --exclude ".gitattributes" \
            --exclude "node_modules/" \
            --exclude "logs/*.log" \
            --exclude "logs/*.txt"

          export MODULE ARCHIVE BUILD_DIR
          python3 - <<'PYZIP'
          import os
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          module = os.environ["MODULE"]
          build_dir = Path(os.environ["BUILD_DIR"])
          archive = Path(os.environ["GITHUB_WORKSPACE"]) / os.environ["ARCHIVE"]
          source = build_dir / module

          with ZipFile(archive, "w", ZIP_DEFLATED) as zip_file:
              for path in sorted(source.rglob("*")):
                  if path.is_file():
                      zip_file.write(path, Path(module) / path.relative_to(source))
          PYZIP

          echo "Archive contents (first 30 entries):"
          unzip -l "${ARCHIVE}" | head -n 35

          if ! unzip -l "${ARCHIVE}" | grep -q "${MODULE}/${MODULE}.php"; then
            echo "Invalid archive: missing ${MODULE}/${MODULE}.php"
            exit 1
          fi

          if [ -f composer.json ] && grep -R "vendor/autoload.php" --include='*.php' --exclude-dir=vendor . >/dev/null; then
            if ! unzip -l "${ARCHIVE}" | grep -q "${MODULE}/vendor/autoload.php"; then
              echo "Invalid archive: missing ${MODULE}/vendor/autoload.php"
              exit 1
            fi
          fi

          echo "archive=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "Built ${ARCHIVE} ($(du -h "${ARCHIVE}" | cut -f1))"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          files: ${{ env.archive }}
          generate_release_notes: true
          fail_on_unmatched_files: true
